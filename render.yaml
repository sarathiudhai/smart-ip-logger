services:
  - type: web
    name: smart-ip-logger
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: EMAIL
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.6"
